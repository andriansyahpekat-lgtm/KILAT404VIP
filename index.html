<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Saldo & Redeem</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-purple-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm text-center">

    <!-- Logo -->
    <img 
      src="https://i.ibb.co/NdyzmTKN/Screenshot-1-removebg-preview-1.png"
      alt="Logo"
      class="mx-auto mb-6 w-40 sm:w-48 md:w-56 h-auto object-contain"
    >

    <!-- Card -->
    <div class="bg-black/40 backdrop-blur-lg border border-purple-500 p-6 sm:p-8 rounded-2xl shadow-2xl">

      <h1 class="text-xl sm:text-2xl font-bold text-white mb-6">
        KLAIM KODE KEMENANGAN
      </h1>

      <!-- Input Player ID -->
      <input 
        type="text" 
        id="playerId"
        placeholder="Masukkan ID Player"
        class="w-full px-4 py-2 mb-3 rounded bg-gray-800 text-white text-center uppercase focus:ring-2 focus:ring-purple-500 outline-none text-sm sm:text-base"
      >

      <!-- Input Kode -->
      <input 
        type="text" 
        id="redeemCode"
        placeholder="Masukkan Kode"
        class="w-full px-4 py-2 mb-5 rounded bg-gray-800 text-white text-center uppercase focus:ring-2 focus:ring-purple-500 outline-none text-sm sm:text-base"
      >

      <!-- Button -->
      <button 
        onclick="spinSlot()"
        class="w-full py-3 rounded-lg font-bold text-white bg-gradient-to-r from-pink-500 to-purple-600 hover:scale-105 transition text-sm sm:text-base"
      >
        AMBIL
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden px-4">
    <div class="bg-gray-900 p-5 sm:p-6 rounded-xl w-full max-w-sm text-center border border-yellow-400">
      
      <h2 id="modalTitle" class="text-lg sm:text-xl font-bold mb-3 text-white"></h2>
      
      <p id="modalText" class="text-sm whitespace-pre-line text-gray-300"></p>

      <button 
        onclick="window.location.href='https://kilat404enjoy.com/?utm_medium=chat&utm_campaign=link-shared-in-chat&utm_source=livechat.com&utm_content=kilat404zo.com'" 
        class="mt-5 px-5 py-2 bg-yellow-500 hover:bg-yellow-600 rounded text-black font-semibold text-sm sm:text-base"
      >
        Login
      </button>
    </div>
  </div>

  <script>
    const validCodes = ["R8TY4X"];

    function spinSlot() {
      const playerId = document.getElementById('playerId').value.trim();
      const redeemCode = document.getElementById('redeemCode').value.trim().toUpperCase();

      if (!playerId || !redeemCode) {
        showModal("❌ Gagal", "ID Player dan Kode Redeem harus diisi!");
        return;
      }

      if (!validCodes.includes(redeemCode)) {
        showModal("❌ Kode Tidak Valid", "Kode redeem yang dimasukkan tidak valid.");
        return;
      }

      const saldoTetap = 735000;

      const saldoFormatted = saldoTetap
        .toString()
        .replace(/\B(?=(\d{3})+(?!\d))/g, ".");

      showModal(
        "🎉 KODE BERHASIL",
        `ID: ${playerId}\nSaldo: ${saldoFormatted}\nBatas Waktu 2 Jam!\nSegera deposit dan menangkan saldonya!`
      );
    }

    function showModal(title, text) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text;
    }
  </script>

</body>
</html>
