
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Slot Saldo & Redeem</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-purple-900 min-h-screen flex flex-col items-center justify-center">

  <!-- Logo -->
  <img 
    src="https://i.ibb.co/NdyzmTKN/Screenshot-1-removebg-preview-1.png"
    alt="Logo"
    class="mb-6 w-50 h-20 object-contain"
  >

  <!-- Container Utama -->
  <div class="bg-black/40 backdrop-blur-lg border border-purple-500 p-8 rounded-2xl shadow-2xl w-80 text-center">
    
    <h1 class="text-2xl font-bold text-white mb-6">KLAIM KODE KEMENANGAN</h1>

    <!-- Input Player ID -->
    <input 
      type="text" 
      id="playerId"
      placeholder="Masukkan ID Player"
      class="w-full px-4 py-2 mb-3 rounded bg-gray-800 text-white text-center uppercase focus:ring-2 focus:ring-purple-500 outline-none"
    >

    <!-- Input Kode Redeem -->
    <input 
      type="text" 
      id="redeemCode"
      placeholder="Masukkan Kode"
      class="w-full px-4 py-2 mb-5 rounded bg-gray-800 text-white text-center uppercase focus:ring-2 focus:ring-purple-500 outline-none"
    >

    <!-- Tombol Ambil -->
    <button 
      onclick="spinSlot()"
      class="w-full py-3 rounded-lg font-bold text-white bg-gradient-to-r from-pink-500 to-purple-600 hover:scale-105 transition"
    >
      AMBIL
    </button>
  </div>

  <!-- Modal Hasil -->
  <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden">
    <div class="bg-gray-900 p-6 rounded-xl w-80 text-center border border-yellow-400">
      <h2 id="modalTitle" class="text-xl font-bold mb-3 text-white"></h2>
      <p id="modalText" class="text-sm whitespace-pre-line text-gray-300"></p>
      <!-- Tombol Login -->
      <button 
        onclick="window.location.href='https://kilat404enjoy.com/?utm_medium=chat&utm_campaign=link-shared-in-chat&utm_source=livechat.com&utm_content=kilat404zo.com'" 
        class="mt-5 px-5 py-2 bg-yellow-500 hover:bg-yellow-600 rounded text-black font-semibold"
      >
        Login
      </button>
    </div>
  </div>

  <script>
    const validCodes = ["KILAT404VIP"]; // kode redeem valid

    function spinSlot() {
      const playerId = document.getElementById('playerId').value.trim();
      const redeemCode = document.getElementById('redeemCode').value.trim().toUpperCase();

      if (!playerId || !redeemCode) {
        showModal("❌ Gagal", "ID Player dan Kode Redeem harus diisi!");
        return;
      }

      if (!validCodes.includes(redeemCode)) {
        showModal("❌ Kode Tidak Valid", "Kode redeem yang dimasukkan tidak valid.");
        return;
      }

      // Saldo acak genap antara 980.000 dan 7.800.000
      const minSaldo = 980000;
      const maxSaldo = 7800000;
      let saldoRandom = Math.floor(Math.random() * (maxSaldo - minSaldo + 1)) + minSaldo;

      if (saldoRandom % 2 !== 0) saldoRandom += 1; // pastikan genap

      const saldoFormatted = saldoRandom.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

      showModal(
        "🎉 KODE BERHASIL", 
        `ID: ${playerId}\nSaldo: ${saldoFormatted}\nBatas Waktu 2 Jam!\nSegera deposit dan menangkan saldonya!`
      );
    }

    function showModal(title, text) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text;
    }
  </script>

</body>
</html>
